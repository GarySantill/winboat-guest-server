name: Build

on:
  push:
    branches: [master]
  release:
    types: [created]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24.2'

      - name: Build Windows binary
        run: |
          GOOS=windows GOARCH=amd64 go build \
            -ldflags="-X main.Version=${{ github.ref_name }} -X main.CommitHash=${{ github.sha }} -X main.BuildTimestamp=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -o winboat_guest_server.exe \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: winboat_guest_server
          path: winboat_guest_server.exe

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: winboat_guest_server.exe
